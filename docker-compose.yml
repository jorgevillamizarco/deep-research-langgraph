# Deep Research Agent + SearXNG — self-contained stack.
#
# Start:   docker compose up -d
# Stop:    docker compose down
#
# The agent and SearXNG communicate over an internal network.
# Both are exposed to the host on their respective ports.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: deep-research-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - searxng_config:/etc/searxng:rw
    environment:
      - SEARXNG_SECRET_KEY=*** \
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O- 'http://localhost:8080/search?q=health&format=json'"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - research-net

  agent:
    build: .
    container_name: deep-research-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8100}:8100"
    env_file:
      - ${ENV_FILE:-.docker.env}
    environment:
      - SEARXNG_URL=http://searxng:8080
      - RESEARCH_OUTPUT_DIR=/data
      - CHECKPOINT_DB_PATH=/app/checkpoints/checkpoints.db
    volumes:
      - research_data:/data
      - research_checkpoints:/app/checkpoints
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8100/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - research-net

volumes:
  searxng_config:
  research_data:
  research_checkpoints:

networks:
  research-net:
    driver: bridge
