# Deep Research Agent — uses the existing SearXNG on the host
#
# The agent runs with `--network host` so it can reach your existing
# SearXNG container at localhost:8080 and the LLM API.
#
# Start:       docker compose up -d
# Stop:        docker compose down
# Register:    hermes mcp add research --url http://localhost:8100/mcp
#              (or any MCP client: mcp install http://localhost:8100/mcp)

services:
  agent:
    build: .
    container_name: deep-research-agent
    restart: unless-stopped
    network_mode: host
    env_file:
      - .docker.env
    environment:
      - SEARXNG_URL=http://localhost:8080
      - RESEARCH_OUTPUT_DIR=/data
    volumes:
      - research_data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8100/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  research_data:
